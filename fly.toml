app = "kiwofarm-backend"
primary_region = "nrt"

[build]

[deploy]
  # DATABASE_URL secret(Supabase 세션 풀러 :5432) 기준으로 배포마다 마이그레이션 자동 적용.
  release_command = "alembic upgrade head"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
