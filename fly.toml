app = "kiwofarm-backend"
primary_region = "nrt"

[build]

[deploy]
  # DB(AWS RDS) 준비 및 DATABASE_URL secret 등록 후 아래 주석을 해제할 것.
  # release_command = "alembic upgrade head"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
